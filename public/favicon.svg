<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#4f46e5"/>

  <!-- Microphone body -->
  <rect x="13" y="5" width="6" height="10" rx="3" fill="white"/>

  <!-- Microphone arc -->
  <path d="M10 14a6 6 0 0 0 12 0" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Mic stand stem -->
  <line x1="16" y1="20" x2="16" y2="23" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Mic stand base -->
  <line x1="12.5" y1="23" x2="19.5" y2="23" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Crossed swords (small, bottom-right) -->
  <g transform="translate(18.5, 18.5) rotate(45) scale(0.72)" opacity="0.92">
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#a5f3fc" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#a5f3fc" stroke-width="1.8" stroke-linecap="round"/>
  </g>
</svg>
